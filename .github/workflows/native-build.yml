name: ExecuTorch Engine Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-executorch-shim:
    uses: ./.github/workflows/native-build-job.yml
    permissions:
      contents: read
 
  # setup-java action repo: https://github.com/actions/setup-java
  build-java-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      code-quality: write
      pull-requests: read
    needs: build-executorch-shim
    steps:
        - uses: actions/checkout@v7
        - uses: actions/setup-java@v5
          with:
            distribution: zulu
            java-version: 17
        
          # Because the artifact isn't the full `src/main/resources/native`
          # we need to give `download-artifact` a target path
        - name: Download the libexecutorch_djl shim
          uses: actions/download-artifact@v8
          with:
            pattern: executorch-libs-*
            path: src/main/resources/native/
            merge-multiple: true
        
        # Debug print
        - run: tree -h src/main/resources/native

        # https://github.com/gradle/actions
        # This has enhanced caching 
        - name: Setup Gradle
          uses: gradle/actions/setup-gradle@v6
        - name: Build and test the Java package
          run: |
              ./gradlew build
              ./gradlew test
              ./gradlew leakTest
        
        - run: tree -h -P "*.xml" --matchdirs build/reports/jacoco
        
        - name: Upload coverage report
          if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
          uses: actions/upload-code-coverage@v1
          with:
            file: build/reports/jacoco/test/cobertura-jacocoTestReport.xml
            fail-on-error: false
            language: Java
            label: jacoco
