# Reusable workflow for building the native shim for both regular builds and version publish
name: Build Executorch Native Shim

on:
  workflow_call:
    outputs:
      artifact-pattern:
        description: "Pattern matching the artifact name for the built shim"
        value: executorch-libs-*

jobs:
  build-executorch-shim:
    strategy:
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-latest
            image: quay.io/pypa/manylinux_2_28_x86_64
            corretto-jdk-url: https://corretto.aws/downloads/latest/amazon-corretto-8-x64-linux-jdk.rpm
          # Commenting out while we wait for our upstream EtRuntimePin.cmake to support aarch64
          #- platform: linux-aarch64
          #  runner: ubuntu-24.04-arm
          #  image: quay.io/pypa/manylinux_2_28_aarch64
          # corretto-jdk-url: https://corretto.aws/downloads/latest/amazon-corretto-8-aarch64-linux-jdk.rpm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout djl-executorch-engine repository
        uses: actions/checkout@v7

      # Use a generic name for the RPM file
      - name: Download Corretto JDK 8 RPM
        run: |
            curl -L -o amazon-corretto-linux-jdk.rpm ${{ matrix.corretto-jdk-url }}

      # Provenance gate: prove the pinned runtime tarball was built by Repo A's CI before we link
      # against it. URL_HASH in native/CMakeLists.txt covers integrity; this covers provenance.
      - name: Verify ExecuTorch runtime provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          url="$(grep -oE 'https://[^"]*logging-${{ matrix.platform }}\.tar\.gz' native/cmake/EtRuntimePin.cmake | head -1)"
          test -n "${url}" || { echo "no logging URL in EtRuntimePin.cmake"; exit 1; }
          curl -fL -o runtime.tgz "${url}"
          gh attestation verify runtime.tgz --repo measly-java-learning/executorch-runtime-dist
          rm -f runtime.tgz

      # This is very similar to how `local_build_wrapper.sh` executes build
      # which enables testing outside of GHA
      - name: Build the libexecutorch_djl shim
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${{ matrix.image }} \
            /bin/bash /workspace/native/build.sh
      
      - name: QA the libexecutorch_djl shim
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${{ matrix.image }} \
            /bin/bash /workspace/native/build_qa.sh
 
      # Make the shim available to the next job
      # If we care about permissions will need to interpose a `tar` step prior to upload
      # https://github.com/actions/upload-artifact#using-outputs
      - name: Store libexecutorch_djl shim
        id: shim-upload-step
        uses: actions/upload-artifact@v7
        with:
          name: executorch-libs-${{ matrix.platform }}
          path: |
            ${{ github.workspace }}/src/main/resources/native/**/*.so
            ${{ github.workspace }}/src/main/resources/native/**/licenses/**
          compression-level: 1 # May want to consider no compression

  # Windows amd64: a sibling job rather than a matrix row, because the linux rows are container-based
  # (manylinux bakes the glibc floor into the image) and Windows has no container. Both jobs upload
  # under the executorch-libs-* pattern, so publish.yml and native-build.yml consume them unchanged.
  # A future macOS platform would follow this same shape. Mirrors executorch-runtime-dist's release.yml.
  build-executorch-shim-windows:
    runs-on: windows-2022
    permissions:
      contents: read
    steps:
      - name: Checkout djl-executorch-engine repository
        uses: actions/checkout@v7

      # Provenance gate: prove the pinned runtime tarball was built by Repo A's CI before we link
      # against it. URL_HASH in native/CMakeLists.txt covers integrity; this covers provenance.
      - name: Verify ExecuTorch runtime provenance
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # -static: the /MT row, which is what native/CMakeLists.txt resolves via ET_RUNTIME_ROW. The
          # /MD row is still in the pin file, so a pattern without the suffix would match it and attest
          # a tarball this build never links.
          url="$(grep -oE 'https://[^"]*logging-windows-x86_64-static\.tar\.gz' native/cmake/EtRuntimePin.cmake | head -1)"
          test -n "${url}" || { echo "no logging URL in EtRuntimePin.cmake"; exit 1; }
          curl -fL -o runtime.tgz "${url}"
          gh attestation verify runtime.tgz --repo measly-java-learning/executorch-runtime-dist
          rm -f runtime.tgz

      # Resolve the VS install ONCE and publish it to $GITHUB_ENV for the steps below. Discovery is
      # edition-agnostic (-products *) rather than hardcoding Enterprise, so a runner-image edition
      # change does not silently break the build. Doing it here also means an image without VS fails
      # on a step that says so, instead of three steps repeating the same lookup.
      #
      # Only DISCOVERY is hoisted, not ACTIVATION: Launch-VsDevShell mutates the current process env,
      # and each step runs in a fresh process, so every step that needs `cl` must still activate.
      - name: Discover Visual Studio
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -property installationPath
          if (-not $vsPath) { throw "vswhere found no Visual Studio installation" }
          # Add-Content, NOT `Out-File -Encoding utf8`: under Windows PowerShell 5.1 that writes a
          # UTF-8 BOM, and a BOM in GITHUB_ENV makes the runner parse the name as "<BOM>VS_PATH", so
          # $env:VS_PATH comes back empty in every later step. pwsh 7 defaults to BOM-less UTF-8 so
          # the declared `shell: pwsh` would be fine today, but Add-Content is BOM-free under both and
          # does not silently depend on which shell this step happens to run under. Verified BOM-free
          # on 5.1; `Out-File -Encoding utf8` was verified to emit a BOM there.
          Add-Content -Path $env:GITHUB_ENV -Value "VS_PATH=$vsPath"
          echo "Visual Studio: $vsPath"

      - name: Build the executorch_djl shim (MSVC)
        shell: pwsh
        run: |
          if (-not $env:VS_PATH) { throw "VS_PATH unset — the 'Discover Visual Studio' step must run first" }
          # Launch-VsDevShell mutates THIS process's env in place; the bash child inherits it.
          & "$env:VS_PATH\Common7\Tools\Launch-VsDevShell.ps1" -Arch amd64 -SkipAutomaticLocation
          # The windows-2022 image ships JDK 8 as JAVA_HOME_8_X64 (8.0.492+9). Bind it EXPLICITLY rather
          # than trusting the image's default JAVA_HOME: the default is an image property GitHub can change,
          # and we want the oldest supported jni.h for the widest runtime compatibility — matching the linux
          # arm's Corretto 8 RPM. We compile against jni.h only and never link libjvm.
          if (-not $env:JAVA_HOME_8_X64) { throw "JAVA_HOME_8_X64 not set on this runner image" }
          $env:JAVA_HOME = $env:JAVA_HOME_8_X64
          # Invoke Git-Bash by explicit path so PATH order cannot select WSL's System32\bash.exe, which
          # would run the build in a Linux environment with no MSVC toolchain. Non-login (`-c`, not
          # `-lc`): a login shell re-sources the profile and resets PATH, dropping the VS env.
          $bash = "${env:ProgramFiles}\Git\bin\bash.exe"
          & $bash -c './native/build.sh'
          if ($LASTEXITCODE -ne 0) { throw "shim build failed (exit $LASTEXITCODE)" }

      - name: QA the executorch_djl shim (MSVC)
        shell: pwsh
        run: |
          if (-not $env:VS_PATH) { throw "VS_PATH unset — the 'Discover Visual Studio' step must run first" }
          & "$env:VS_PATH\Common7\Tools\Launch-VsDevShell.ps1" -Arch amd64 -SkipAutomaticLocation
          $bash = "${env:ProgramFiles}\Git\bin\bash.exe"
          & $bash -c './native/build_qa.sh'
          if ($LASTEXITCODE -ne 0) { throw "shim QA failed (exit $LASTEXITCODE)" }

      # Stands in for the clean-image redist test, which we have no machine to run: asserts the CRT
      # directives across the shim tree and that the DLL imports no VCRUNTIME/MSVCP. Runs before the
      # upload so a dynamically-linked DLL is never published as an artifact.
      - name: Assert the shim links the static CRT (MSVC)
        shell: pwsh
        run: |
          if (-not $env:VS_PATH) { throw "VS_PATH unset — the 'Discover Visual Studio' step must run first" }
          & "$env:VS_PATH\Common7\Tools\Launch-VsDevShell.ps1" -Arch amd64 -SkipAutomaticLocation
          $bash = "${env:ProgramFiles}\Git\bin\bash.exe"
          & $bash -c './native/tests/check_windows_crt.sh native/build src/main/resources/native/windows-x86_64/executorch_djl.dll'
          if ($LASTEXITCODE -ne 0) { throw "windows CRT check failed (exit $LASTEXITCODE)" }

      - name: Store executorch_djl shim
        uses: actions/upload-artifact@v7
        with:
          name: executorch-libs-windows-x86_64
          path: |
            ${{ github.workspace }}/src/main/resources/native/**/*.dll
            ${{ github.workspace }}/src/main/resources/native/**/licenses/**
          compression-level: 1
